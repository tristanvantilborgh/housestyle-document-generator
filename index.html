<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>UGent MOM — Housestyle Generator</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue:#1E64C8;--blue-dark:#154FA0;--blue-light:#EEF3FD;
      --blue-mid:#C5D8F5;--gray:#63666A;--border:#DCE3EF;--row:#F5F8FE;
    }
    body{font-family:Arial,sans-serif;background:#e5eaf4;height:100vh;overflow:hidden;display:flex;flex-direction:column}

    /* ── App bar ── */
    .app-bar{height:52px;background:var(--blue);display:flex;align-items:center;padding:0 22px;gap:14px;flex-shrink:0;box-shadow:0 2px 10px rgba(30,100,200,.28)}
    .app-brand{font-size:.67rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);border-right:1px solid rgba(255,255,255,.18);padding-right:14px}
    .app-bar h1{font-size:.88rem;font-weight:600;color:#fff}
    .app-bar .sp{flex:1}
    .app-badge{font-size:.64rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.18);padding:3px 10px;border-radius:99px}

    /* ── Workspace ── */
    .workspace{display:grid;grid-template-columns:360px 1fr;flex:1;overflow:hidden}

    /* ── Left panel ── */
    .left{background:#181f2e;display:flex;flex-direction:column;border-right:1px solid #0d1117;overflow:hidden}
    .left-top{padding:14px;border-bottom:1px solid #252d3d}
    .left-top-label{font-size:.67rem;font-weight:700;color:#607090;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}

    /* Drop zone */
    .dropzone{
      border:2px dashed #2e3d55;border-radius:8px;
      padding:22px 16px;text-align:center;cursor:pointer;
      transition:all .2s;position:relative;
    }
    .dropzone:hover,.dropzone.drag-over{border-color:var(--blue);background:rgba(30,100,200,.07)}
    .dropzone svg{opacity:.4;margin-bottom:8px}
    .dropzone-title{font-size:.82rem;font-weight:700;color:#8bacd4;margin-bottom:4px}
    .dropzone-sub{font-size:.7rem;color:#4a5e78}
    .dropzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

    /* Lezen button */
    .btn-lezen{
      width:100%;margin-top:10px;padding:9px;
      background:var(--blue);color:#fff;border:none;border-radius:6px;
      font-family:inherit;font-size:.8rem;font-weight:700;
      letter-spacing:.04em;text-transform:uppercase;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:7px;
      transition:background .15s;position:relative;overflow:hidden;
    }
    .btn-lezen:hover{background:var(--blue-dark)}
    .btn-lezen input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

    /* File list */
    .file-list{flex:1;overflow-y:auto;padding:10px 14px}
    .file-list::-webkit-scrollbar{width:4px}
    .file-list::-webkit-scrollbar-thumb{background:#252d3d;border-radius:3px}
    .file-item{
      display:flex;align-items:center;gap:8px;
      padding:8px 10px;border-radius:6px;
      border:1px solid #252d3d;background:#1e2840;
      margin-bottom:6px;cursor:pointer;transition:all .15s;
    }
    .file-item:hover{border-color:var(--blue);background:#1e2d50}
    .file-item.active{border-color:var(--blue);background:#1e2d50;box-shadow:0 0 0 2px rgba(30,100,200,.25)}
    .file-dot{width:8px;height:8px;border-radius:50%;background:#2e3d55;flex-shrink:0}
    .file-item.active .file-dot{background:var(--blue)}
    .file-item.done .file-dot{background:#22c55e}
    .file-name{font-size:.72rem;color:#9ab8dc;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace}
    .file-remove{background:none;border:none;color:#4a5e78;cursor:pointer;font-size:.9rem;padding:0 2px;line-height:1;transition:color .15s}
    .file-remove:hover{color:#f87171}

    .left-footer{padding:10px 14px;border-top:1px solid #252d3d;display:flex;gap:8px}
    .btn-gen{
      flex:1;padding:10px;background:var(--blue);color:#fff;border:none;
      border-radius:6px;font-family:inherit;font-size:.82rem;font-weight:700;
      letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:background .15s;
    }
    .btn-gen:hover{background:var(--blue-dark)}
    .btn-gen:disabled{background:#2e3d55;color:#4a5e78;cursor:not-allowed}
    .btn-clear{padding:10px 12px;background:transparent;border:1px solid #2e3d55;border-radius:6px;color:#607090;cursor:pointer;font-family:inherit;font-size:.75rem;font-weight:700;transition:all .15s}
    .btn-clear:hover{border-color:#f87171;color:#f87171}

    /* ── Preview ── */
    .preview{display:flex;flex-direction:column;background:#dce2ee;overflow:hidden}
    .preview-bar{height:44px;background:#fff;border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .preview-label{font-size:.7rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.1em}
    .preview-bar .sp{flex:1}

    /* Tab bar for multiple docs */

    .theme-group{display:inline-flex;gap:3px;background:#f0f2f5;border-radius:6px;padding:3px}
    .theme-btn{padding:4px 13px;border:none;border-radius:4px;font-size:.72rem;font-weight:700;cursor:pointer;background:transparent;color:#6b7280;transition:all .15s;letter-spacing:.03em}
    .theme-btn.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.12)}
    .theme-btn:hover:not(.active){color:#1a1a1a}
    .btn-print{display:inline-flex;align-items:center;gap:6px;background:var(--blue-light);color:var(--blue);border:1px solid var(--blue-mid);border-radius:5px;padding:6px 14px;font-family:inherit;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .15s;flex-shrink:0}
    .btn-print:hover{background:var(--blue-mid)}

    .stage{flex:1;overflow-y:auto;padding:28px;display:flex;flex-direction:column;align-items:center;gap:28px}
    .stage::-webkit-scrollbar{width:7px}
    .stage::-webkit-scrollbar-thumb{background:#b5c2d3;border-radius:4px}

    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;width:100%;height:100%;color:#8fa3bd;text-align:center}
    .empty svg{opacity:.3}
    .empty p{font-size:.88rem}
    .empty small{font-size:.75rem;opacity:.7}

    /* ══════════════════════════════════
       A4 DOCUMENT — UGent huisstijl
    ══════════════════════════════════ */
    .a4{width:794px;min-height:1123px;background:#fff;box-shadow:0 6px 40px rgba(0,0,0,.18);display:flex;flex-direction:column;font-family:Arial,sans-serif;font-size:12px;color:#2a2d35}

    .a4-header{display:flex;justify-content:space-between;align-items:center;padding:18px 50px 16px;border-bottom:1px solid var(--border)}
    .a4-logo{height:96px;width:auto}
    .a4-header-right{text-align:right}
    .a4-dept{font-size:13px;color:var(--blue);font-weight:400;line-height:1.4}
    .a4-body{flex:1;padding:22px 50px 16px}
    .a4-title{font-size:19px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.02em;line-height:1.25;margin-bottom:12px}
    .a4-rule{border:none;border-top:2px solid var(--blue);margin-bottom:16px}
    .a4-meta{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:11px}
    .a4-meta tr{border-bottom:1px solid var(--border)}
    .a4-meta tr:last-child{border-bottom:2px solid var(--blue)}
    .a4-meta td{padding:5px 8px;vertical-align:top}
    .a4-meta td:first-child{font-weight:700;color:var(--blue);font-size:8.5px;letter-spacing:.07em;text-transform:uppercase;width:110px;padding-left:0;background:var(--row)}
    .a4-meta tr:nth-child(odd) td:first-child{background:var(--blue-light)}
    .a4-meta td:last-child{color:var(--gray)}
    .p-chips{display:flex;flex-wrap:wrap;gap:5px}
    .p-chip{display:inline-flex;align-items:center;gap:6px;background:var(--blue-light);color:var(--blue-dark);border:1px solid var(--blue-mid);border-radius:2px;padding:3px 9px;font-size:10.5px;font-weight:600}
    .p-chip.absent{background:#f5f5f6;color:var(--gray);border-color:#d0d3d8;font-weight:400}
    .p-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .p-chip .p-dot{background:var(--blue)}
    .p-chip.absent .p-dot{background:#b0b3b8}
    .p-chip .p-status{font-size:8.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;opacity:.7}
    .a4-sec{margin-bottom:16px}
    .a4-sec-title{background:var(--blue-light);color:var(--blue);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:6px 12px 6px 14px;border-left:4px solid var(--blue);margin-bottom:10px}
    .a4-topic{margin-bottom:12px}
    .a4-topic-h{font-size:11px;font-weight:700;color:var(--blue);padding-bottom:4px;border-bottom:1px solid var(--border);margin-bottom:5px}
    .a4-blist{list-style:none;padding:0}
    .a4-blist li{position:relative;padding-left:14px;margin-bottom:3px;font-size:11px;color:var(--gray);line-height:1.55}
    .a4-blist li::before{content:'—';position:absolute;left:0;color:var(--blue);font-weight:700}
    .a4-decs{display:flex;flex-direction:column;gap:4px}
    .a4-dec{display:flex;gap:10px;align-items:flex-start;padding:7px 10px;border:1px solid var(--border);border-radius:2px}
            .a4-dec-n{min-width:20px;color:var(--blue);font-size:9px;font-weight:700;flex-shrink:0;padding-top:2px}
    .a4-dec-t{font-size:11px;color:var(--gray);line-height:1.55}
    .a4-acts{display:flex;flex-direction:column;gap:4px}
    .a4-act{display:flex;gap:10px;align-items:flex-start;padding:7px 10px;border:1px solid var(--border);border-radius:2px}
    .a4-act-n{min-width:20px;color:var(--blue);font-size:9px;font-weight:700;flex-shrink:0;padding-top:2px}
    .a4-act-body{flex:1;font-size:11px;color:var(--gray);line-height:1.55}
    .a4-act-ass{font-size:10px;color:var(--blue-dark);font-weight:700;margin-top:3px}
    .a4-footer{margin:0;padding:0 50px 48px}
    .a4-footer::before{content:'';display:block;border-top:1px solid var(--border);margin-bottom:.5cm;margin-top:24px}
    .a4-foot-row{display:flex;justify-content:space-between;font-size:9px}
    .a4-foot-row.lbl{font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
    .a4-foot-row.val{color:var(--gray)}
    .a4-foot-row div{flex:1;text-align:center}
    .a4-foot-row div:first-child{text-align:left}
    .a4-foot-row div:last-child{text-align:right}


    /* ── BAC theme overrides ────────────────────────────── */
    .a4.bac{--blue:#E4002B;--blue-dark:#9A0020;--blue-light:#FEF0F2;--blue-mid:#F5C0C8;--border:#EDD5DA;--gray:#4A4A4A;--row:#FEF6F7}
    .a4.bac .a4-rule{border-top-color:#E4002B}
    .a4.bac .a4-meta tr:last-child{border-bottom:2px solid #E4002B}
    .a4.bac .a4-title{color:#001E4E}
    .a4.bac .a4-dept{color:#E4002B}
    .a4.bac .a4-sec-title{background:var(--blue-light);color:#9A0020;border-left-color:#E4002B}
    .a4.bac .a4-topic-h{color:#001E4E}
    .a4.bac .a4-blist li::before{color:#E4002B}
    .a4.bac .a4-dec-n,.a4.bac .a4-act-n{color:#E4002B}
    .a4.bac .a4-act-ass{color:#001E4E}
    .a4.bac .p-chip{background:#FEF0F2;color:#9A0020;border-color:#F5C0C8}
    .a4-logo-bac{display:flex;align-items:center;height:80px}
    .a4-logo-bac svg{height:70px;width:auto}
    .page-label{font-size:.65rem;font-weight:700;color:#8fa3bd;text-transform:uppercase;letter-spacing:.1em;padding:8px 0 2px;align-self:flex-start;margin-left:2px}
    @media print{
      body{background:white;overflow:visible;height:auto}
      .app-bar,.left,.preview-bar{display:none!important}
      .workspace{display:block}
      .preview{background:white;overflow:visible}
      .stage{padding:0;background:white;display:block}
      .a4{box-shadow:none;width:100%;min-height:100vh}
      .a4-page-break{page-break-before:always}
      .page-label{display:none}
      @page{size:A4;margin:0}
    }
  </style>
</head>
<body>

<header class="app-bar">
  <h1>MOM Housestyle Generator</h1>
  <div class="sp"></div>
  <span class="app-badge">XML → A4 Document</span>
</header>

<div class="workspace">

  <!-- ── Left: file manager ── -->
  <aside class="left">
    <div class="left-top">
      <div class="left-top-label">XML Bestanden</div>

      <!-- Drop zone -->
      <div class="dropzone" id="dropzone">
        <input type="file" accept=".xml" multiple id="drop-input" onchange="handleFiles(this.files)">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#4a6fa5" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <div class="dropzone-title">Sleep XML hier naartoe</div>
        <div class="dropzone-sub">of klik om te bladeren</div>
      </div>

      <!-- Lezen button -->
      <button class="btn-lezen">
        <input type="file" accept=".xml" multiple onchange="handleFiles(this.files)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
          <polyline points="13 2 13 9 20 9"/>
        </svg>
        Lezen
      </button>
    </div>

    <!-- Skip notice -->
    <div id="skip-notice" style="display:none;margin:6px 14px 0;padding:7px 10px;background:#2d1f1f;color:#fca5a5;border:1px solid #7f1d1d;border-radius:5px;font-size:.72rem;font-family:monospace"></div>
    <!-- File list -->
    <div class="file-list" id="file-list">
      <div style="text-align:center;padding:20px 0;color:#3d5070;font-size:.75rem">
        Nog geen bestanden geladen
      </div>
    </div>

    <div class="left-footer">
      <button class="btn-gen" id="btn-gen" onclick="generateAll()" disabled>
        ▶ &nbsp;Genereren
      </button>
      <button class="btn-clear" onclick="clearAll()">Wissen</button>
    </div>
  </aside>

  <!-- ── Right: preview ── -->
  <main class="preview">
    <div class="preview-bar">
      <div class="theme-group">
        <button class="theme-btn active" data-theme="ugent" onclick="setTheme('ugent')">UGent</button>
        <button class="theme-btn" data-theme="bac" onclick="setTheme('bac')">BAC</button>
      </div>
      <div style="flex:1"></div>
      <button class="btn-print" onclick="printDoc()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 6 2 18 2 18 9"/>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
        Afdrukken / PDF
      </button>
    </div>
    <div class="stage" id="stage">
      <div class="empty">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#9aaac0" stroke-width="1.2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <p>Geen documenten gegenereerd</p>
        <small>Sleep XML-bestanden of gebruik de "Lezen" knop</small>
      </div>
    </div>
  </main>

</div>

var BAC_LOGO_SVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 72" width="200" height="70">'
  +'<rect x="0" y="4" width="62" height="62" fill="#E4002B" rx="3"/>'
  +'<path d="M14 50 Q19 22 32 19 Q41 18 46 24 Q53 31 46 38 Q41 42 32 40 L30 50Z" fill="white" opacity="0.13"/>'
  +'<text x="31" y="50" font-family="Arial,Helvetica,sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">B</text>'
  +'<text x="74" y="30" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="700" fill="#001E4E" letter-spacing="2.5">brussels</text>'
  +'<text x="74" y="50" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="700" fill="#001E4E" letter-spacing="2.5">airport</text>'
  +'<text x="74" y="64" font-family="Arial,Helvetica,sans-serif" font-size="8.5" fill="#888" letter-spacing="0.8" font-style="italic">the heart of Europe</text>'
  +'</svg>';

// ── State ──────────────────────────────────────────────────────────────────
var files = [];       // [{name, content}]
var docs  = [];       // [{name, html}]  — generated
var activeDoc = -1;
var currentTheme = 'ugent';

// ── Drag & drop ────────────────────────────────────────────────────────────
var dz = document.getElementById('dropzone');
document.body.addEventListener('dragover', function(e){ e.preventDefault(); dz.classList.add('drag-over'); });
document.body.addEventListener('dragleave', function(e){ if(!e.relatedTarget||!dz.contains(e.relatedTarget)) dz.classList.remove('drag-over'); });
document.body.addEventListener('drop', function(e){
  e.preventDefault(); dz.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});

function handleFiles(flist){
  var skipped=0;
  for(var i=0;i<flist.length;i++){
    var f=flist[i];
    if(!f.name.toLowerCase().endsWith('.xml')){ skipped++; continue; }
    if(files.find(function(x){return x.name===f.name;})) continue;
    (function(file){
      var reader=new FileReader();
      reader.onload=function(e){ files.push({name:file.name,content:e.target.result}); renderFileList(); };
      reader.readAsText(file);
    })(f);
  }
  if(skipped>0) showSkipNotice(skipped);
  setTimeout(function(){ document.getElementById('btn-gen').disabled=(files.length===0); }, 200);
}

function showSkipNotice(n){
  var el=document.getElementById('skip-notice');
  el.textContent='⚠ '+n+' bestand'+(n>1?'en':'')+' overgeslagen (geen .xml)';
  el.style.display='block';
  clearTimeout(el._t);
  el._t=setTimeout(function(){el.style.display='none';},3500);
}

function removeFile(idx){
  files.splice(idx,1);
  renderFileList();
  document.getElementById('btn-gen').disabled=(files.length===0);
}

function clearAll(){
  files=[]; docs=[]; activeDoc=-1;
  renderFileList();
  document.getElementById('stage').innerHTML=emptyState();
  document.getElementById('btn-gen').disabled=true;
}

function renderFileList(){
  var el=document.getElementById('file-list');
  if(!files.length){ el.innerHTML='<div style="text-align:center;padding:20px 0;color:#3d5070;font-size:.75rem">Nog geen bestanden geladen</div>'; return; }
  var h='';
  files.forEach(function(f,i){
    var isActive=docs[activeDoc]&&docs[activeDoc].name===f.name;
    var isDone=!!docs.find(function(d){return d.name===f.name;});
    var cls='file-item'+(isActive?' active':isDone?' done':'');
    h+='<div class="'+cls+'" onclick="previewFile(\''+escJs(f.name)+'\')">';
    h+='<span class="file-dot"></span>';
    h+='<span class="file-name" title="'+esc(f.name)+'">'+esc(f.name)+'</span>';
    h+='<button class="file-remove" onclick="event.stopPropagation();removeFile('+i+')" title="Verwijder">&#x2715;</button>';
    h+='</div>';
  });
  el.innerHTML=h;
}

function setTheme(t){
  currentTheme=t;
  document.querySelectorAll('.theme-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.theme===t);
  });
  // rebuild all cached docs with new theme
  docs=docs.map(function(d){
    var f=files.find(function(x){return x.name===d.name;});
    return f ? {name:f.name, html:buildDoc(f.name,f.content,t)} : d;
  });
  if(docs[activeDoc]) document.getElementById('stage').innerHTML=docs[activeDoc].html;
}

// ── Generate ───────────────────────────────────────────────────────────────
function generateAll(){
  docs=[];
  files.forEach(function(f){
    var html=buildDoc(f.name, f.content, currentTheme);
    docs.push({name:f.name, html:html});
  });
  if(docs.length>0) showDoc(0);
  renderFileList();
}

function previewFile(name){
  var idx=docs.findIndex(function(d){return d.name===name;});
  if(idx>=0){ showDoc(idx); return; }
  // auto-generate single
  var f=files.find(function(x){return x.name===name;});
  if(f){ var h=buildDoc(f.name,f.content,currentTheme); docs.push({name:f.name,html:h}); showDoc(docs.length-1); renderFileList(); }
}


function printDoc(){
  var prev=document.title;
  if(docs[activeDoc]) document.title=docs[activeDoc].name.replace(/\.xml$/i,'');
  window.print();
  document.title=prev;
}

function showDoc(idx){
  activeDoc=idx;
  document.getElementById('stage').innerHTML=docs[idx].html;
  renderFileList();
}

function emptyState(){
  return '<div class="empty"><svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#9aaac0" stroke-width="1.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><p>Geen documenten gegenereerd</p><small>Sleep XML-bestanden of gebruik de "Lezen" knop</small></div>';
}

// ── XML → HTML ─────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escJs(s){return s.replace(/'/g,"\\'");}
function gtext(node,sel,def){var el=node?node.querySelector(sel):null;return el?(el.textContent||'').trim():(def||'');}
function fmtDate(s){
  var mo=['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
  var m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(s);if(!m)return s;
  return parseInt(m[3])+' '+mo[parseInt(m[2])-1]+' '+m[1];
}

function buildDoc(filename, xmlStr, theme){
  theme=theme||'ugent';
  var parser=new DOMParser();
  var xdoc=parser.parseFromString(xmlStr,'application/xml');
  if(xdoc.querySelector('parsererror'))
    return '<div style="padding:40px;color:#dc2626;font-family:monospace">Ongeldige XML in: '+esc(filename)+'</div>';

  var meta=xdoc.querySelector('meta');
  var pid=gtext(meta,'projectId'), dtype=gtext(meta,'docType','MOM');
  var subj=gtext(meta,'subject'), date=gtext(meta,'date');
  var dateFmt=fmtDate(date);
  var ref=(date?date.replace(/-/g,''):'YYYYMMDD')+'_'+(pid||'[ID]')+'_'+dtype+'_'+(subj?subj.replace(/\s+/g,'-'):'[Subject]');

  var parts=Array.from(xdoc.querySelectorAll('participants participant')).map(function(p){return {name:p.textContent.trim(),present:(p.getAttribute('present')||'true').toLowerCase()!=='false'};}).filter(function(p){return p.name;});
  var notes=Array.from(xdoc.querySelectorAll('notes note')).map(function(n){
    return {subj:gtext(n,'subject'),bullets:Array.from(n.querySelectorAll('bullets bullet')).map(function(b){return b.textContent.trim();}).filter(Boolean)};
  });
  var decs=Array.from(xdoc.querySelectorAll('decisions decision')).map(function(d){return d.textContent.trim();}).filter(Boolean);
  var acts=Array.from(xdoc.querySelectorAll('actions action')).map(function(a){
    return {text:gtext(a,'text'),assignee:gtext(a,'assignee')};
  }).filter(function(a){return a.text;});

    // ── Multi-page layout ────────────────────────────────────────────────────
  var totalPages = 1 + (notes.length ? 1 : 0) + (decs.length || acts.length ? 1 : 0);

  function pgHeader(){
    var s='<div class="a4-header">';
    if(theme==='bac'){
      s+='<div class="a4-logo-bac">'+BAC_LOGO_SVG+'</div>';
      s+='<div class="a4-header-right"><div class="a4-dept">Brussels Airport Company NV/SA</div></div>';
    } else {
      s+='<img class="a4-logo" src="data:image/png;base64,'+LOGO+'" alt="Universiteit Gent">';
      s+='<div class="a4-header-right"><div class="a4-dept">Informatie- en Communicatietechnologie</div></div>';
    }
    s+='</div>';
    return s;
  }
  function pgFooter(n,tot,su,dt,fn){
    return '<div class="a4-footer"><div class="a4-foot-row lbl"><div>Document</div><div>Bestand</div><div>Pagina</div></div>'
      +'<div class="a4-foot-row val"><div>'+esc(su||dt)+'</div><div>'+esc(fn)+'</div><div>Pagina '+n+' van '+tot+'</div></div></div>';
  }
  function wrapPage(body,r,n,tot,su,dt,brk,fn){
    var themeCls=theme==='bac'?' bac':'';
    var s='';
    if(brk) s+='<div class="page-label">Pagina '+n+'</div>';
    s+='<div class="a4'+themeCls+(brk?' a4-page-break':'')+'">'+pgHeader()+'<div class="a4-body">'+body+'</div>'+pgFooter(n,tot,su,dt,fn)+'</div>';
    return s;
  }

  var h=''; var pg=1;

  // PAGE 1 — titel, meta, inhoud
  var p1='';
  p1+='<div class="a4-title">'+esc(subj||'[Onderwerp]')+'</div><hr class="a4-rule">';
  p1+='<table class="a4-meta">';
  if(dateFmt) p1+='<tr><td>Datum</td><td>'+esc(dateFmt)+'</td></tr>';
  if(pid)     p1+='<tr><td>Project ID</td><td>'+esc(pid)+'</td></tr>';
  p1+='<tr><td>Bestand</td><td>'+esc(filename)+'</td></tr>';
  if(parts.length){
    p1+='<tr><td>Deelnemers</td><td><div class="p-chips">';
    parts.forEach(function(p){
      var cls=p.present?'p-chip':'p-chip absent';
      var label=p.present?'aanwezig':'afwezig';
      p1+='<span class="'+cls+'"><span class="p-dot"></span>'+esc(p.name)+'<span class="p-status">'+label+'</span></span>';
    });
    p1+='</div></td></tr>';
  }
  p1+='</table>';
  if(notes.length){
    p1+='<div class="a4-sec"><div class="a4-sec-title">Inhoud</div><ul class="a4-blist">';
    notes.forEach(function(n){p1+='<li>'+esc(n.subj)+'</li>';});
    p1+='</ul></div>';
  }
  h+=wrapPage(p1,ref,pg++,totalPages,subj,dtype,false,filename);

  // PAGE 2 — Notities
  if(notes.length){
    var p2='<div class="a4-sec"><div class="a4-sec-title">Notities</div>';
    notes.forEach(function(n){
      p2+='<div class="a4-topic"><div class="a4-topic-h">'+esc(n.subj)+'</div><ul class="a4-blist">';
      n.bullets.forEach(function(b){p2+='<li>'+esc(b)+'</li>';});
      p2+='</ul></div>';
    });
    p2+='</div>';
    h+=wrapPage(p2,ref,pg++,totalPages,subj,dtype,true,filename);
  }

  // PAGE 3 — Beslissingen + Actiepunten
  if(decs.length||acts.length){
    var p3='';
    if(decs.length){
      p3+='<div class="a4-sec"><div class="a4-sec-title">Beslissingen</div><div class="a4-decs">';
      decs.forEach(function(d,i){
        p3+='<div class="a4-dec"><span class="a4-dec-n">'+(i+1)+'</span><span class="a4-dec-t">'+esc(d)+'</span></div>';
      });
      p3+='</div></div>';
    }
    if(acts.length){
      p3+='<div class="a4-sec"><div class="a4-sec-title">Actiepunten</div><div class="a4-acts">';
      acts.forEach(function(a,i){
        p3+='<div class="a4-act"><span class="a4-act-n">'+(i+1)+'</span>';
        p3+='<div class="a4-act-body">'+esc(a.text)+(a.assignee?'<div class="a4-act-ass">'+esc(a.assignee)+'</div>':'')+'</div></div>';
      });
      p3+='</div></div>';
    }
    h+=wrapPage(p3,ref,pg++,totalPages,subj,dtype,true,filename);
  }

  return h;
}
</script>
</body>
</html>
